name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Prepare test runtime directories
        run: python -c "from pathlib import Path; Path('data/test_runs').mkdir(parents=True, exist_ok=True)"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Coverage
        run: python -m coverage run -m unittest discover -s tests

      - name: Coverage report
        shell: pwsh
        run: |
          python -m coverage report | Tee-Object -FilePath coverage-report.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Write CI evidence summary
        shell: pwsh
        run: |
          @"
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          head_sha=${{ github.sha }}
          ref=${{ github.ref }}
          runner_os=${{ runner.os }}
          matrix_os=${{ matrix.os }}
          python_version=${{ matrix.python-version }}
          "@ | Out-File -FilePath ci-evidence-summary.txt -Encoding utf8

      - name: Upload CI evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            coverage-report.txt
            ci-evidence-summary.txt
          if-no-files-found: error
          retention-days: 14
