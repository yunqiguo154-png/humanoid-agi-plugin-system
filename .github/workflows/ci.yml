name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Prepare test runtime directories
        run: python -c "from pathlib import Path; Path('data/test_runs').mkdir(parents=True, exist_ok=True)"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Coverage
        run: python -m coverage run -m unittest discover -s tests

      - name: Coverage report
        shell: pwsh
        run: |
          python -m coverage report | Tee-Object -FilePath coverage-report.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Write CI evidence summary
        shell: pwsh
        run: |
          @"
          workflow=${{ github.workflow }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          head_sha=${{ github.sha }}
          ref=${{ github.ref }}
          runner_os=${{ runner.os }}
          matrix_os=${{ matrix.os }}
          python_version=${{ matrix.python-version }}
          "@ | Out-File -FilePath ci-evidence-summary.txt -Encoding utf8

      - name: Upload CI evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            coverage-report.txt
            ci-evidence-summary.txt
          if-no-files-found: error
          retention-days: 14

  github-hosted-bwrap-diagnostic:
    name: github-hosted bwrap diagnostic
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RUNNER_ENVIRONMENT: github-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Prepare evidence directory
        run: mkdir -p evidence data/test_runs

      - name: Run Linux quality gate
        run: |
          python -m unittest discover -s tests
          python -m ruff check .
          python -m mypy .
          python -m coverage run -m unittest discover -s tests
          python -m coverage report | tee evidence/coverage-report.txt

      - name: Capture Linux environment
        run: |
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "head_sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
            echo "runner_os=${{ runner.os }}"
            echo "python=$(python --version)"
            echo "uname=$(uname -a)"
            echo "bwrap=$(bwrap --version)"
            if command -v lsb_release >/dev/null 2>&1; then
              lsb_release -a
            fi
          } > evidence/linux_environment.txt

      - name: Run production doctor
        run: plugin-cli --production doctor --json > evidence/doctor.json
        continue-on-error: true

      - name: Run GitHub-hosted bwrap diagnostic
        run: |
          set +e
          python scripts/validate_bwrap_sandbox.py --mode diagnostic --json > evidence/bwrap_diagnostic_github_hosted.json
          status=$?
          cat evidence/bwrap_diagnostic_github_hosted.json
          exit "$status"

      - name: Run acceptance evidence collection
        run: python scripts/run_production_acceptance.py --json --output evidence/acceptance_result.json
        continue-on-error: true

      - name: Generate local audit verify evidence
        run: python scripts/generate_audit_verify_evidence.py --output evidence/audit_verify.json

      - name: Evaluate release gate
        run: python scripts/release_gate.py --json > evidence/release_gate.json
        continue-on-error: true

      - name: Upload GitHub-hosted bwrap diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-hosted-bwrap-diagnostic-evidence-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 14

  target-linux-bwrap-production-validation:
    name: target linux bwrap production validation
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, bwrap]
    env:
      RUNNER_ENVIRONMENT: self-hosted
      RUNNER_LABELS: self-hosted,linux,bwrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify bubblewrap
        run: |
          command -v bwrap
          bwrap --version

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Prepare evidence directory
        run: mkdir -p evidence data/test_runs

      - name: Run Linux quality gate
        run: |
          python -m unittest discover -s tests
          python -m ruff check .
          python -m mypy .
          python -m coverage run -m unittest discover -s tests
          python -m coverage report | tee evidence/coverage-report.txt

      - name: Capture target Linux environment
        run: |
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "head_sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
            echo "runner_os=${{ runner.os }}"
            echo "runner_environment=${{ runner.environment }}"
            echo "python=$(python --version)"
            echo "uname=$(uname -a)"
            echo "bwrap=$(bwrap --version)"
            if command -v lsb_release >/dev/null 2>&1; then
              lsb_release -a
            fi
          } > evidence/linux_environment.txt

      - name: Run production doctor
        run: plugin-cli --production doctor --json > evidence/doctor.json

      - name: Run production-required bwrap validation
        run: python scripts/validate_bwrap_sandbox.py --mode production-required --json > evidence/bwrap_validation.json

      - name: Run acceptance evidence collection
        run: python scripts/run_production_acceptance.py --json --output evidence/acceptance_result.json

      - name: Generate local audit verify evidence
        run: python scripts/generate_audit_verify_evidence.py --output evidence/audit_verify.json

      - name: Evaluate release gate
        run: python scripts/release_gate.py --json > evidence/release_gate.json
        continue-on-error: true

      - name: Upload target Linux bwrap production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target-linux-bwrap-production-evidence-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 14
